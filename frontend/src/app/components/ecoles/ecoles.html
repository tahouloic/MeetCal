<div class="ecoles-container">
  <div class="header">
    <h1>Gestion des Écoles</h1>
    <button class="btn-primary" (click)="openCreateModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Nouvelle École
    </button>
  </div>

  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="onSearch()"
      placeholder="Rechercher une école..."
      class="search-input"
    />
  </div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="isLoading" class="loading">Chargement...</div>

  <div *ngIf="!isLoading && filteredSchools.length === 0" class="empty-state">
    <p>Aucune école trouvée</p>
  </div>

  <div *ngIf="!isLoading && filteredSchools.length > 0" class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Nom</th>
          <th>Abréviation</th>
          <th>Date de création</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let school of filteredSchools">
          <td>{{ school.code }}</td>
          <td>{{ school.name }}</td>
          <td>{{ school.abbreviation }}</td>
          <td>{{ school.createdAt | date: 'dd/MM/yyyy HH:mm' }}</td>
          <td class="actions">
            <button class="btn-icon btn-edit" (click)="openEditModal(school)" title="Modifier">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button class="btn-icon btn-delete" (click)="deleteSchool(school)" title="Supprimer">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ isEditMode ? 'Modifier l\'école' : 'Nouvelle école' }}</h2>
      <button class="btn-close" (click)="closeModal()">×</button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="code">Code *</label>
        <input
          type="text"
          id="code"
          [(ngModel)]="formData.code"
          name="code"
          required
          placeholder="Ex: SJI"
          [disabled]="isEditMode"
        />
      </div>

      <div class="form-group">
        <label for="name">Nom complet *</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="formData.name"
          name="name"
          required
          placeholder="Ex: Saint Jean Ingénieur"
        />
      </div>

      <div class="form-group">
        <label for="abbreviation">Abréviation *</label>
        <input
          type="text"
          id="abbreviation"
          [(ngModel)]="formData.abbreviation"
          name="abbreviation"
          required
          placeholder="Ex: SJI"
        />
      </div>

      <div *ngIf="error" class="alert alert-error">{{ error }}</div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" (click)="closeModal()">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
