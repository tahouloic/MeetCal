# Configuration Nginx pour IUSJC Schedule Management
# Copiez ce fichier dans /etc/nginx/sites-available/iusjc-schedule
# Puis créez un lien symbolique: sudo ln -s /etc/nginx/sites-available/iusjc-schedule /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Taille maximale des fichiers uploadés
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/iusjc-access.log;
    error_log /var/log/nginx/iusjc-error.log;

    # Frontend - Proxy vers le conteneur frontend
    location / {
        proxy_pass http://localhost:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Backend API - Proxy vers le conteneur backend via frontend nginx
    location /api {
        proxy_pass http://localhost:80/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts pour les requêtes API
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

