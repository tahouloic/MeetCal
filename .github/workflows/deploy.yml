name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2-key.pem
          chmod 600 ~/.ssh/ec2-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          # Créer une archive sans les dossiers volumineux
          zip -r deployment.zip \
            appointment-booking-platform \
            deployment-scripts \
            docker-compose.yml \
            -x "*/node_modules/*" \
            -x "*/target/*" \
            -x "*/.angular/*" \
            -x "*/dist/*" \
            -x "*/.git/*"

      - name: Transfer files to EC2
        run: |
          scp -i ~/.ssh/ec2-key.pem \
            -o StrictHostKeyChecking=no \
            deployment.zip \
            ubuntu@${{ secrets.EC2_HOST }}:~/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2-key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            
            # Créer une sauvegarde avant la mise à jour
            echo "📦 Création d'une sauvegarde..."
            bash ~/deployment-scripts/backup-db.sh || true
            
            # Arrêter les services
            echo "🛑 Arrêt des services..."
            cd ~
            docker-compose down || true
            
            # Supprimer l'ancien code
            echo "🗑️ Nettoyage de l'ancien code..."
            rm -rf ~/appointment-booking-platform
            
            # Extraire la nouvelle version
            echo "📂 Extraction de la nouvelle version..."
            unzip -q -o ~/deployment.zip -d ~/
            rm ~/deployment.zip
            
            # Rendre les scripts exécutables
            chmod +x ~/deployment-scripts/*.sh
            
            # Reconstruire et redémarrer
            echo "🔨 Reconstruction des images..."
            docker-compose build --no-cache
            
            echo "🚀 Démarrage des services..."
            docker-compose up -d
            
            # Attendre que les services démarrent
            echo "⏳ Attente du démarrage des services..."
            sleep 30
            
            # Vérifier l'état
            echo "✅ Vérification de l'état des services..."
            docker-compose ps
            
            echo "🎉 Déploiement terminé!"
          EOF

      - name: Verify deployment
        run: |
          echo "🔍 Vérification du déploiement..."
          
          # Vérifier que le backend répond
          for i in {1..10}; do
            if curl -f http://${{ secrets.EC2_HOST }}/api/health > /dev/null 2>&1; then
              echo "✅ Backend opérationnel!"
              exit 0
            fi
            echo "⏳ Tentative $i/10..."
            sleep 10
          done
          
          echo "❌ Le backend ne répond pas"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/ec2-key.pem
          rm -f deployment.zip
